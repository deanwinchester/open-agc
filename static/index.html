<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Open-AGC Panda 🐼</title>
    <!-- Modern Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <!-- Highlight.js for Code Blocks -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="logo">
                    <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="45" fill="#f4f6f5" stroke="#1a1c1e" stroke-width="8" />
                        <!-- Ears -->
                        <circle cx="25" cy="25" r="16" fill="#1a1c1e" />
                        <circle cx="75" cy="25" r="16" fill="#1a1c1e" />
                        <!-- Eyes -->
                        <circle cx="35" cy="45" r="12" fill="#1a1c1e" />
                        <circle cx="65" cy="45" r="12" fill="#1a1c1e" />
                        <circle cx="35" cy="42" r="4" fill="#ffffff" />
                        <circle cx="65" cy="42" r="4" fill="#ffffff" />
                        <!-- Nose -->
                        <ellipse cx="50" cy="62" rx="6" ry="4" fill="#1a1c1e" />
                        <path d="M44 70 C 50 75, 50 75, 56 70" stroke="#1a1c1e" stroke-width="4"
                            stroke-linecap="round" />
                    </svg>
                    <span>Open-AGC</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="theme-toggle" title="Toggle Theme">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                    <button class="icon-btn" id="settings-btn" title="Settings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>

            <button class="new-chat-btn" id="new-chat-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span data-i18n="new_session">New Session</span>
            </button>

            <div class="sidebar-content" style="flex: 1; overflow-y: auto;">
                <h3 class="section-title" data-i18n="skills_lib">Skills Library</h3>
                <div class="skill-list" id="skills-container">
                    <!-- Skills will be loaded here -->
                    <div class="skill-item"><span class="spinner" style="width: 12px; height: 12px"></span> <span
                            data-i18n="loading">Loading...</span></div>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main glass-panel">
            <header class="chat-header">
                <h2 data-i18n="workspace">Panda Workspace</h2>
                <div class="model-badge" id="current-model-badge">GPT-4o</div>
            </header>

            <div class="chat-history" id="chat-container">
                <div class="message system">
                    <div class="avatar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                    </div>
                    <div class="content" id="welcome-msg">
                        Hello! I am Panda, your Agentic Computer Assistant.
                        I can execute commands, manage files, and run code. How can I help you today?
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-container">
                <div class="input-box glass-panel-inner">
                    <textarea id="message-input" data-i18n-prop="placeholder" data-i18n="placeholder"
                        placeholder="Ask Panda to do something on this computer..." rows="1" autofocus></textarea>
                    <div class="input-actions">
                        <button class="action-btn send-btn" id="send-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="footer-text" data-i18n="footer_warning">Open-AGC AI can make mistakes. Verify critical
                    actions before permitting.</div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="settings_title">Agent Settings</h3>
                <button class="icon-btn" id="close-settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label data-i18n="provider">AI Provider</label>
                    <select class="form-control" id="provider-select">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="gemini">Google Gemini</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="model_name">Model Name</label>
                    <select class="form-control" id="model-input">
                        <!-- Options will be populated dynamically via app.js -->
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="api_key">API Key</label>
                    <input type="password" class="form-control" id="api-key-input" placeholder="sk-...">
                </div>
                <button class="btn-primary" id="save-settings-btn" data-i18n="save_changes">Save Changes</button>
                <div id="settings-notification" class="notification"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="/static/app.js"></script>
</body>

</html>
