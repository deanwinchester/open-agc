<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Open-AGC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Import main theme variables -->
    <link rel="stylesheet" href="/static/style.css">
    <!-- Settings-specific styles -->
    <link rel="stylesheet" href="/static/settings.css">
</head>

<body>
    <!-- Top Navigation Bar -->
    <nav class="top-bar">
        <a href="/" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            <span>返回对话</span>
        </a>
        <h1 class="page-title">🐼 设置</h1>
        <button class="theme-btn" id="theme-toggle" title="切换主题">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
        </button>
    </nav>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="tab active" data-target="models-pane">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            模型配置
        </button>
        <button class="tab" data-target="skills-pane">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                    d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z">
                </path>
            </svg>
            技能管理
        </button>
    </div>

    <!-- Main Content -->
    <main class="settings-body">
        <!-- Models Configuration Pane -->
        <div class="pane active" id="models-pane">

            <!-- API Keys Card -->
            <section class="card">
                <div class="card-header">
                    <h2>🔑 API 密钥</h2>
                    <p class="card-desc">配置各厂商的 API Key，未填写的厂商将不可用。</p>
                </div>
                <div class="api-keys-grid" id="api-keys-container">
                    <!-- JS populates -->
                </div>
            </section>

            <!-- Model Selection Card -->
            <section class="card">
                <div class="card-header">
                    <h2>🤖 默认模型</h2>
                    <p class="card-desc">选择主力模型，以及在主力不可用时的备选回退顺序。</p>
                </div>

                <div class="field">
                    <label>默认厂商 & 模型</label>
                    <div class="model-row">
                        <select id="provider-select" class="select-styled">
                            <option value="openai">OpenAI</option>
                            <option value="anthropic">Anthropic</option>
                            <option value="gemini">Google Gemini</option>
                            <option value="deepseek">DeepSeek</option>
                            <option value="kimi">Kimi (Moonshot)</option>
                            <option value="glm">GLM (智谱)</option>
                            <option value="minimax">MiniMax</option>
                        </select>
                        <select id="model-name-select" class="select-styled">
                            <option value="gpt-4o">gpt-4o</option>
                        </select>
                        <button id="fetch-models-btn" class="btn-icon" title="刷新模型列表">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <polyline points="1 20 1 14 7 14"></polyline>
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15">
                                </path>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="field">
                    <label>回退模型（逗号分隔）</label>
                    <input type="text" id="fallback-models-input" class="input-styled"
                        placeholder="如：gpt-3.5-turbo, claude-3-haiku-20240307">
                    <small class="field-hint">当默认模型不可用时，将按此顺序依次尝试。</small>
                </div>
            </section>
        </div>

        <!-- Skills Configuration Pane -->
        <div class="pane" id="skills-pane">
            <section class="card">
                <div class="card-header">
                    <h2>🛠️ 技能管理</h2>
                    <p class="card-desc">控制 Agent 可调用的技能开关，关闭的技能不会被加载。</p>
                </div>
                <div class="skills-list" id="skills-config-container">
                    <div class="loading-indicator">
                        <div class="spinner"></div>
                        <span>加载中...</span>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Sticky Save Bar -->
    <footer class="save-bar">
        <div class="save-bar-inner">
            <div id="save-status" class="save-status"></div>
            <button id="save-settings-btn" class="btn-save">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                    <polyline points="7 3 7 8 15 8"></polyline>
                </svg>
                保存设置
            </button>
        </div>
    </footer>

    <!-- Permission Request Dialog -->
    <div class="modal-overlay" id="permission-modal">
        <div class="modal-box">
            <h3>⚠️ 需要系统权限</h3>
            <p class="modal-desc" id="perm-modal-desc">
                该操作需要额外的系统权限。请在终端中执行以下命令授权：
            </p>
            <div class="modal-code" id="perm-modal-code">
                chmod +x ./start.sh
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="perm-modal-close">关闭</button>
                <button class="btn-primary" id="perm-modal-copy">复制命令</button>
            </div>
        </div>
    </div>

    <script src="/static/settings.js"></script>
</body>

</html>
